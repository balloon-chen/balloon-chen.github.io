<!doctype html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>生日互動賀卡</title>
  
  <!-- Beautiful Premium Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Noto+Serif+TC:wght@500;600;700&display=swap" rel="stylesheet">
  
  <!-- Tailwind CSS via browser compiler -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'caramel-gold': '#d4a373',
            'oatmeal': '#E6DFD5',
            'slate-dark': '#121212',
          },
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            serif: ['"Noto Serif TC"', 'serif'],
            mono: ['"JetBrains Mono"', 'monospace'],
          }
        }
      }
    }
  </script>

  <style>
    /* Continuous background ambience stars */
    @keyframes pulse-slow {
      0%, 100% { opacity: 0.15; }
      50% { opacity: 0.35; }
    }
    .animate-pulse-slow {
      animation: pulse-slow 6s infinite ease-in-out;
      will-change: opacity;
    }

    /* Traditional physical guitar string vibration curve model */
    @keyframes vibrate {
      0% { transform: scaleX(1) translateX(0); }
      15% { transform: scaleX(1.35) translateX(-4px); }
      30% { transform: scaleX(0.7) translateX(3.5px); }
      45% { transform: scaleX(1.15) translateX(-2.5px); }
      60% { transform: scaleX(0.85) translateX(1.5px); }
      75% { transform: scaleX(1.05) translateX(-1px); }
      90% { transform: scaleX(0.95) translateX(0.5px); }
      100% { transform: scaleX(1) translateX(0); }
    }
    .string-vibrate {
      animation: vibrate 0.55s ease-in-out;
    }

    /* Candle fire warm flicker motion */
    @keyframes flame-flicker {
      0% { transform: scaleX(1) scaleY(1) rotate(-1deg); }
      20% { transform: scaleX(0.84) scaleY(1.15) rotate(1.5deg); }
      40% { transform: scaleX(1.12) scaleY(0.88) rotate(-1.5deg); }
      60% { transform: scaleX(0.9) scaleY(1.08) rotate(1deg); }
      80% { transform: scaleX(1.06) scaleY(0.94) rotate(-0.5deg); }
      100% { transform: scaleX(1) scaleY(1) rotate(-1deg); }
    }
    .flame-animation {
      animation: flame-flicker 1.5s infinite ease-in-out;
      transform-origin: bottom center;
    }

    /* Smooth page transitioning states */
    .transition-fade {
      transition: opacity 800ms cubic-bezier(0.4, 0, 0.2, 1), transform 800ms cubic-bezier(0.4, 0, 0.2, 1);
    }
    
    /* Elegant Custom Scrollbar */
    ::-webkit-scrollbar {
      width: 4px;
    }
    ::-webkit-scrollbar-track {
      background: transparent;
    }
    ::-webkit-scrollbar-thumb {
      background: rgba(212, 163, 115, 0.2);
      border-radius: 99px;
    }
  </style>
</head>
<body class="bg-[#121212] text-oatmeal min-h-screen flex flex-col items-center justify-start pt-12 md:pt-20 pb-12 overflow-x-hidden selection:bg-caramel-gold/20 selection:text-caramel-gold font-sans antialiased relative">

  <!-- Ambient Blurred Backdrop Lights -->
  <div class="fixed inset-0 overflow-hidden pointer-events-none z-0">
    <div class="absolute top-1/4 left-1/4 w-72 h-72 bg-[#d4a373]/10 rounded-full blur-[100px] animate-pulse-slow"></div>
    <div class="absolute bottom-1/3 right-1/4 w-80 h-80 bg-[#d4a373]/5 rounded-full blur-[120px] animate-pulse-slow" style="animation-delay: 2s;"></div>
  </div>

  <main class="relative z-10 w-full max-w-lg mx-auto px-4 py-8">

    <!-- ==================== SCREEN 1: GUITAR INTRO ==================== -->
    <div id="screen-guitar" class="transition-fade opacity-100 flex flex-col items-center justify-center text-center">
      
      <!-- Top Chinese Banner Text -->
      <div class="mb-8 text-caramel-gold text-[15px] tracking-[0.16em] font-serif font-semibold cursor-pointer text-center max-w-xs leading-relaxed animate-pulse">
        撥動琴弦，解鎖今日限定的神秘禮物
      </div>

      <!-- Compact Simulated Guitar Frame -->
      <div id="guitar-box" class="relative w-72 h-[340px] mx-auto bg-gradient-to-b from-[#181818] to-[#141414] rounded-3xl border border-caramel-gold/15 shadow-2xl overflow-hidden flex flex-col justify-between p-6 touch-none select-none">
        
        <!-- Wooden Fingerboard running down -->
        <div class="absolute left-1/2 -translate-x-1/2 top-0 w-16 h-28 bg-[#1f1a16] border-x border-caramel-gold/10 opacity-80 flex flex-col justify-around py-2">
          <div class="h-[2px] bg-[#3a3028] w-full"></div>
          <div class="h-[2px] bg-[#3a3028] w-full"></div>
          <div class="h-[2px] bg-[#3a3028] w-full"></div>
          <div class="h-[2px] bg-[#3a3028] w-full"></div>
        </div>

        <!-- Rosette Sound Hole -->
        <div class="absolute left-1/2 -translate-x-1/2 top-36 w-32 h-32 rounded-full bg-black flex items-center justify-center border-4 border-caramel-gold/20 shadow-inner">
          <div class="w-28 h-28 rounded-full border border-dashed border-caramel-gold/30 flex items-center justify-center"></div>
        </div>

        <!-- 6 Strings layered vertically -->
        <div id="strings-layer" class="absolute inset-x-0 top-0 bottom-16 flex justify-around px-12 z-20">
          
          <!-- String 1 -->
          <div data-string-id="1" class="relative h-full w-12 flex flex-col items-center cursor-pointer group">
            <div class="string-line absolute h-full w-[2px] bg-oatmeal/60 shadow-md transition-all duration-150"></div>
            <div class="bridge-dot absolute bottom-[-16px] w-[6px] h-[6px] rounded-full bg-caramel-gold/40 transition-all duration-300 z-30"></div>
          </div>
          
          <!-- String 2 -->
          <div data-string-id="2" class="relative h-full w-12 flex flex-col items-center cursor-pointer group">
            <div class="string-line absolute h-full w-[2px] bg-oatmeal/60 shadow-md transition-all duration-150"></div>
            <div class="bridge-dot absolute bottom-[-16px] w-[6px] h-[6px] rounded-full bg-caramel-gold/40 transition-all duration-300 z-30"></div>
          </div>
          
          <!-- String 3 -->
          <div data-string-id="3" class="relative h-full w-12 flex flex-col items-center cursor-pointer group">
            <div class="string-line absolute h-full w-[2px] bg-oatmeal/60 shadow-md transition-all duration-150"></div>
            <div class="bridge-dot absolute bottom-[-16px] w-[6px] h-[6px] rounded-full bg-caramel-gold/40 transition-all duration-300 z-30"></div>
          </div>
          
          <!-- String 4 -->
          <div data-string-id="4" class="relative h-full w-12 flex flex-col items-center cursor-pointer group">
            <div class="string-line absolute h-full w-[2px] bg-oatmeal/60 shadow-md transition-all duration-150"></div>
            <div class="bridge-dot absolute bottom-[-16px] w-[6px] h-[6px] rounded-full bg-caramel-gold/40 transition-all duration-300 z-30"></div>
          </div>
          
          <!-- String 5 -->
          <div data-string-id="5" class="relative h-full w-12 flex flex-col items-center cursor-pointer group">
            <div class="string-line absolute h-full w-[2px] bg-oatmeal/60 shadow-md transition-all duration-150"></div>
            <div class="bridge-dot absolute bottom-[-16px] w-[6px] h-[6px] rounded-full bg-caramel-gold/40 transition-all duration-300 z-30"></div>
          </div>
          
          <!-- String 6 -->
          <div data-string-id="6" class="relative h-full w-12 flex flex-col items-center cursor-pointer group">
            <div class="string-line absolute h-full w-[2px] bg-oatmeal/60 shadow-md transition-all duration-150"></div>
            <div class="bridge-dot absolute bottom-[-16px] w-[6px] h-[6px] rounded-full bg-caramel-gold/40 transition-all duration-300 z-30"></div>
          </div>

        </div>

        <!-- Solid Wooden Bridge holds strings at the bottom -->
        <div class="absolute bottom-12 left-1/2 -translate-x-1/2 w-40 h-5 bg-[#251b14] border border-[#3e2e22] rounded-md shadow-md z-10"></div>
      </div>
      
    </div>

    <!-- ==================== SCREEN 2: SECRET BASE &祝福 BOARD ==================== -->
    <div id="screen-secret-base" class="transition-fade opacity-0 scale-95 hidden w-full flex flex-col space-y-8">
      
      <!-- Embedded Soundtrack Controller -->
      <div class="relative z-10 w-full flex items-center justify-between bg-black/40 border border-caramel-gold/15 rounded-2xl px-4 py-3 shadow-lg">
        <div class="flex items-center space-x-3">

            <svg id="music-vinyl-icon" class="w-3.5 h-3.5 text-caramel-gold transition-transform duration-1000" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <polygon points="6 3 20 12 6 21 6 3"/>
            </svg>
          </div>
          <div>
            <div class="text-[12px] font-sans text-caramel-gold font-medium tracking-wide">
              Baby - Lindsay Lohan
            </div>
          </div>
        </div>

        <div class="flex items-center space-x-3">
          <!-- Volume slider control -->
          <div class="flex items-center space-x-2 bg-zinc-900/60 px-2.5 py-1.5 rounded-lg border border-oatmeal/5">
            <button id="volume-toggle-btn" class="text-oatmeal/60 hover:text-caramel-gold transition-colors duration-200 focus:outline-none">
              <!-- Inline Volume Full SVG -->
              <svg class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M11 5L6 9H2v6h4l5 4V5z"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
              </svg>
            </button>
            <input 
              id="volume-slider"
              type="range" 
              min="0" 
              max="1" 
              value="0.35"
              step="0.05"
              class="w-16 h-1 bg-zinc-800 rounded-lg appearance-none cursor-pointer accent-caramel-gold outline-none"
            />
          </div>

          <!-- Play/Pause Button -->
          <button 
            id="play-pause-btn"
            class="p-1.5 rounded-lg bg-caramel-gold/10 hover:bg-caramel-gold/25 border border-caramel-gold/20 text-caramel-gold transition-colors duration-200 cursor-pointer"
          >
            <!-- Play SVG standard -->
            <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polygon points="6 3 20 12 6 21 6 3"/>
            </svg>
          </button>
        </div>
      </div>

      <!-- Main Blessings Content frame -->
      <div class="w-full bg-[#181818] border border-caramel-gold/15 rounded-3xl overflow-hidden shadow-2xl flex flex-col">
        <div class="px-8 py-10 flex flex-col space-y-4 min-h-[220px]">
          <div id="typewriter-container" class="space-y-4 font-serif text-oatmeal/90 text-[15px] leading-8 tracking-wide text-center">
            <!-- Typist lines will be written here dynamically -->
          </div>
        </div>
      </div>

      <!-- ==================== INTERACTIVE CANDLE ELEMENT ==================== -->
      <div id="candle-interaction-card" class="transition-fade opacity-0 scale-95 hidden w-full">
        <div class="relative w-full min-h-[480px] bg-gradient-to-b from-[#181818]/60 to-[#121212]/30 rounded-3xl border border-caramel-gold/15 pt-10 pb-8 px-6 flex flex-col items-center justify-start overflow-hidden">
          
          <!-- Confetti canvas for sparks & fire trails -->
          <canvas id="sparkles-canvas" class="absolute inset-0 w-full h-full pointer-events-none z-10"></canvas>

          <!-- Status feedback instruction -->
          <div class="w-full text-center h-8 flex items-center justify-center select-none z-25 mb-4">
            <div id="candle-prompt" class="text-caramel-gold font-serif text-base tracking-[0.15em] font-medium transition-all duration-300">
              許下你的心願
            </div>
          </div>

          <!-- Physical Candle Graphics Section -->
          <div class="relative w-full h-52 flex items-center justify-center z-20">
            <!-- Radiant warm backdrop glow when lit -->
            <div id="candle-radial-glow" class="absolute w-44 h-44 bg-gradient-to-radial from-caramel-gold/30 via-caramel-gold/5 to-transparent blur-[35px] rounded-full pointer-events-none opacity-0 transition-opacity duration-700 animate-pulse"></div>

            <div id="candle-anchor" class="relative flex flex-col items-center cursor-default group transition-all duration-300">
              
              <!-- Flickering Candle Flame (Starts Hidden) -->
              <div id="candle-flame" class="absolute -top-12 flex flex-col items-center select-none hidden pointer-events-none">
                <!-- Flame background aura -->
                <div class="w-9 h-14 rounded-full bg-gradient-to-t from-caramel-gold/80 via-yellow-400/40 to-transparent blur-sm animate-pulse absolute -top-2.5"></div>
                <!-- Interactive center body core -->
                <div class="flame-animation w-4 h-9 rounded-b-full rounded-t-full bg-gradient-to-t from-[#B07D48] via-caramel-gold to-[#FAE8B2] shadow-[0_0_18px_rgba(212,163,115,0.8)]"></div>
                <!-- Base fire temperature cue -->
                <div class="w-3 h-4 rounded-full bg-sky-400/50 blur-[1px] absolute top-6"></div>
              </div>

              <!-- Candle Wick -->
              <div class="w-[3px] h-3.5 bg-zinc-700 rounded-t-full"></div>

              <!-- Premium Candle Shaft -->
              <div class="relative w-7 h-28 bg-gradient-to-r from-[#cfad8c] via-[#ecd5be] to-[#bfa07f] rounded-t-sm shadow-xl flex flex-col justify-start overflow-hidden">
                <!-- Wax teardrops -->
                <div class="absolute top-0 left-1 w-1.5 h-10 bg-white/60 rounded-b-full shadow-inner opacity-80"></div>
                <div class="absolute top-0 right-1.5 w-1 h-6 bg-white/45 rounded-b-full opacity-60"></div>
                <div class="absolute top-0 left-2.5 w-1 h-14 bg-white/40 rounded-b-full opacity-50"></div>
                
                <!-- Cozy Small Heart sticker -->
                <div class="absolute bottom-6 inset-x-0 flex justify-center opacity-40 group-hover:opacity-90 transition-opacity duration-300">
                  <svg class="w-3 h-3 text-[#503E2D]" fill="currentColor" viewBox="0 0 24 24">
                    <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
                  </svg>
                </div>
              </div>

              <!-- Candleholder bottom tray -->
              <div class="w-16 h-2.5 bg-gradient-to-r from-zinc-800 via-zinc-700 to-zinc-900 rounded-full shadow-lg border-b border-zinc-900"></div>
              <div class="w-12 h-1.5 bg-gradient-to-r from-zinc-900 to-zinc-850 rounded-b-full"></div>
            </div>
          </div>

          <!-- Wish text / Submission Forms -->
          <div class="w-full max-w-xs mx-auto z-25 flex flex-col items-center">
            
            <!-- Step 1 Writing Wish Structure Form -->
            <form id="wish-form" class="w-full flex flex-col space-y-3 transition-all duration-300">
              <div class="flex flex-col space-y-2 text-center">
                <label class="text-[11px] font-sans text-caramel-gold font-bold uppercase tracking-[0.16em]">
                  寫下你的三個生日願望
                </label>
                <input
                  id="wish-input-1"
                  type="text"
                  required
                  maxlength="45"
                  placeholder="第一個願望"
                  class="w-full px-4 py-2.5 rounded-xl bg-black/55 border border-caramel-gold/35 text-oatmeal text-sm placeholder-oatmeal/25 focus:outline-none focus:border-caramel-gold/80 focus:ring-1 focus:ring-caramel-gold/40 font-serif text-center transition-all duration-300"
                />
                <input
                  id="wish-input-2"
                  type="text"
                  required
                  maxlength="45"
                  placeholder="第二個願望"
                  class="w-full px-4 py-2.5 rounded-xl bg-black/55 border border-caramel-gold/35 text-oatmeal text-sm placeholder-oatmeal/25 focus:outline-none focus:border-caramel-gold/80 focus:ring-1 focus:ring-caramel-gold/40 font-serif text-center transition-all duration-300"
                />
                <input
                  id="wish-input-3"
                  type="text"
                  required
                  maxlength="45"
                  placeholder="第三個願望"
                  class="w-full px-4 py-2.5 rounded-xl bg-black/55 border border-caramel-gold/35 text-oatmeal text-sm placeholder-oatmeal/25 focus:outline-none focus:border-caramel-gold/80 focus:ring-1 focus:ring-caramel-gold/40 font-serif text-center transition-all duration-300"
                />
              </div>
              <button
                id="wish-submit-btn"
                type="submit"
                disabled
                class="w-full py-3 rounded-xl bg-gradient-to-r from-[#D4A373] to-[#C8963E] text-[#121212] font-sans text-xs tracking-widest font-extrabold uppercase shadow-lg shadow-caramel-gold/15 hover:shadow-caramel-gold/30 disabled:opacity-30 disabled:cursor-not-allowed transition-all duration-300 hover:scale-[1.01]"
              >
                填好了，為蠟燭注入心願 ✦
              </button>
            </form>

            <!-- Step 2 Lit Wish Confirmation Badge -->
            <div id="wish-badge-lit" class="w-full flex-col items-center space-y-2 select-none hidden transition-all duration-300">
              <div class="px-4 py-3 bg-caramel-gold/5 border border-caramel-gold/15 rounded-xl w-full text-center shadow-lg flex flex-col space-y-1.5 justify-center">
                <span class="text-[10px] font-sans tracking-wide text-caramel-gold/50 block mb-1">已點亮三個願望 ✨</span>
                <p class="text-sm font-serif text-caramel-gold flex items-center justify-center space-x-1">
                  <span id="lit-wish-text-1">1. 願望內容</span>
                </p>
                <p class="text-sm font-serif text-caramel-gold flex items-center justify-center space-x-1">
                  <span id="lit-wish-text-2">2. 願望內容</span>
                </p>
                <p class="text-sm font-serif text-caramel-gold flex items-center justify-center space-x-1">
                  <span id="lit-wish-text-3">3. 願望內容</span>
                </p>
              </div>
            </div>

            <!-- Step 3 Final Extinguished Wish sealed container -->
            <div id="wish-badge-final" class="w-full text-center flex flex-col justify-center items-center hidden transition-all duration-300 space-y-2">
              <div class="flex flex-col space-y-2 px-5 py-4 rounded-2xl bg-black/40 border border-caramel-gold/15 text-xs font-serif text-caramel-gold shadow-md w-full justify-center text-center">
                <div class="flex items-center justify-center space-x-2 text-caramel-gold/80 mb-1">
                  <svg class="w-4 h-4 fill-caramel-gold text-caramel-gold animate-bounce" viewBox="0 0 24 24">
                    <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
                  </svg>
                  <span class="font-sans font-bold text-[10px] uppercase tracking-wider">宇宙已收到你的願望✦</span>
                </div>
                <p id="final-wish-text-1" class="text-sm tracking-wide font-semibold text-oatmeal/90"></p>
                <p id="final-wish-text-2" class="text-sm tracking-wide font-semibold text-oatmeal/90"></p>
                <p id="final-wish-text-3" class="text-sm tracking-wide font-semibold text-oatmeal/90"></p>
              </div>
            </div>

          </div>

        </div>
      </div>

    </div>

  </main>

  <!-- BACKGROUND SOUND AUDIO SOURCE -->
  <audio id="bg-soundtrack" loop src="https://cdn-www.cw.com.tw/voice/202605/voice-6a171be7eccb65.21769132.mp3"></audio>

  <!-- ==================== VANILLA APP CONTROLLER SCRIPTS ==================== -->
  <script>
    // --- State & Constants Configurations ---
    const BLESSING_PARAGRAPHS = [
      "在宇宙的無數顆星星之中，總有一顆，",
      "專屬於今晚的溫柔。✨",
      "撥動了這根琴弦，就像撥通了與你相遇的波長。",
      "謝謝你來到這個世界，讓平常的日子，也變得閃閃發光。",
      "在這個特別的日子裡，願你哭過笑過，依然被世界溫柔以待；",
      "願所有微小而確切的幸福，都在你需要時如期而至。🌌",
      "「生日快樂。願你所期盼的星光，落滿在你眼裡的銀河。」💐"
    ];

    const GUITAR_PRESET_TUNINGS = [
      { id: 1, frequency: 196.00, color: "rgba(212, 163, 115, 0.4)" },
      { id: 2, frequency: 246.94, color: "rgba(212, 163, 115, 0.6)" },
      { id: 3, frequency: 329.63, color: "rgba(212, 163, 115, 0.8)" },
      { id: 4, frequency: 392.00, color: "rgba(212, 163, 115, 0.9)" },
      { id: 5, frequency: 493.88, color: "rgba(212, 163, 115, 1.0)" },
      { id: 6, frequency: 659.25, color: "rgba(212, 163, 115, 0.7)" }
    ];

    // Shared references
    let audioCtx = null;
    let particles = [];
    let canvas, ctx, animationFrame;
    const touchedStrings = new Set();
    let hasUnlocked = false;
    let isPlayingMusic = false;
    let selectedWish1 = '';
    let selectedWish2 = '';
    let selectedWish3 = '';
    let candleState = 'writing'; // 'writing' | 'lit' | 'blown'

    // DOM Elements cache
    const screenGuitar = document.getElementById('screen-guitar');
    const screenSecretBase = document.getElementById('screen-secret-base');
    const stringsContainer = document.getElementById('strings-layer');
    const bgAudio = document.getElementById('bg-soundtrack');
    const playPauseBtn = document.getElementById('play-pause-btn');
    const volumeSlider = document.getElementById('volume-slider');
    const volumeToggleBtn = document.getElementById('volume-toggle-btn');
    const vinylIcon = document.getElementById('music-vinyl-icon');
    const typewriterContainer = document.getElementById('typewriter-container');
    const candleCard = document.getElementById('candle-interaction-card');
    
    // Candle DOMs
    const candlePrompt = document.getElementById('candle-prompt');
    const candleFlame = document.getElementById('candle-flame');
    const candleAnchor = document.getElementById('candle-anchor');
    const candleGlow = document.getElementById('candle-radial-glow');
    const wishForm = document.getElementById('wish-form');
    const wishInput1 = document.getElementById('wish-input-1');
    const wishInput2 = document.getElementById('wish-input-2');
    const wishInput3 = document.getElementById('wish-input-3');
    const wishSubmitBtn = document.getElementById('wish-submit-btn');
    const wishLitBadge = document.getElementById('wish-badge-lit');
    const wishFinalBadge = document.getElementById('wish-badge-final');
    const litWishText1 = document.getElementById('lit-wish-text-1');
    const litWishText2 = document.getElementById('lit-wish-text-2');
    const litWishText3 = document.getElementById('lit-wish-text-3');
    const finalWishText1 = document.getElementById('final-wish-text-1');
    const finalWishText2 = document.getElementById('final-wish-text-2');
    const finalWishText3 = document.getElementById('final-wish-text-3');

    // --- Web Audio Synthesizer Engine ---
    function initAudioContext() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
      if (audioCtx.state === 'suspended') {
        audioCtx.resume();
      }
    }

    // High comfort realistic acoustic string pluck synthesis (fully silenced to remove sound effects)
    function playPluckSound(frequency) {
      // Intentionally silent to remove sound effects
    }

    // Interactive soft typewriter select audio clicks (disabled to ensure no sound effects)
    function playTypewriterClick() {
      // Intentionally kept silent to remove typing sound effects
    }

    // Sparkles major G' chord sweep (fully silenced to remove sound effects)
    function playUnlockingArpeggio() {
      // Intentionally silent to remove sound effects

    // --- Interaction Physics Particles and Sparkles systems ---
    function triggerRenderLoop() {
      if (!animationFrame && canvas && ctx) {
        renderLoop();
      }
    }

    function renderLoop() {
      if (!ctx || !canvas) return;
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      if (particles.length === 0) {
        animationFrame = null;
        return;
      }

      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.vx;
        p.y += p.vy;
        p.vy += p.gravity;
        if (p.shake) {
          p.x += (Math.random() - 0.5) * p.shake;
        }
        p.alpha -= p.decay;

        if (p.alpha <= 0) {
          particles.splice(i, 1);
          continue;
        }

        ctx.save();
        ctx.globalAlpha = p.alpha;
        ctx.fillStyle = p.color;
        
        // Draw crisp core circle
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fill();
        
        // Draw soft outer bloom halo with zero shadow-rendering rendering overhead
        ctx.globalAlpha = p.alpha * 0.35;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size * 2.2, 0, Math.PI * 2);
        ctx.fill();
        
        ctx.restore();
      }

      animationFrame = requestAnimationFrame(renderLoop);
    }

    function initSparklesCanvas() {
      canvas = document.getElementById('sparkles-canvas');
      if (!canvas) return;
      ctx = canvas.getContext('2d');
      
      const handleResize = () => {
        canvas.width = canvas.parentElement.clientWidth;
        canvas.height = canvas.parentElement.clientHeight;
      };
      
      handleResize();
      window.addEventListener('resize', handleResize);
      
      triggerRenderLoop();
    }

    // Sparks when candle submitting
    function createRisingSparkles(x, y) {
      const colors = ['#D4A373', '#F4E3B1', '#FFB74D', '#FFFFFF'];
      for (let i = 0; i < 40; i++) {
        particles.push({
          x: x + (Math.random() * 160 - 80),
          y: y,
          vx: (Math.random() * 1.6 - 0.8),
          vy: -Math.random() * 2.5 - 1.2,
          color: colors[Math.floor(Math.random() * colors.length)],
          alpha: 1.0,
          size: Math.random() * 2.2 + 0.9,
          decay: Math.random() * 0.008 + 0.004,
          gravity: -0.015
        });
      }
      triggerRenderLoop();
    }

    // Soft wick smoke trail puff
    function createWickSmoke(x, y) {
      for (let i = 0; i < 18; i++) {
        particles.push({
          x: x + (Math.random() * 4 - 2),
          y: y - 10,
          vx: (Math.random() * 0.8 - 0.4),
          vy: -Math.random() * 1.2 - 0.6,
          color: '#d4a373',
          alpha: 0.8,
          size: Math.random() * 3 + 1,
          decay: 0.012,
          gravity: -0.015
        });
      }
      triggerRenderLoop();
    }

    // Golden celebratory fireworks pattern
    function spawnFireworkSplendor(x, y, color) {
      const colors = ['#D4A373', '#F4E3B1', '#C8963E', '#FFFFFF', '#FFB74D'];
      const count = 90 + Math.floor(Math.random() * 30);
      for (let i = 0; i < count; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = Math.random() * 4.2 + 1.6;
        particles.push({
          x: x,
          y: y,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed - (Math.random() * 1.5),
          color: color || colors[Math.floor(Math.random() * colors.length)],
          alpha: 1.0,
          size: Math.random() * 2.5 + 0.7,
          decay: Math.random() * 0.012 + 0.006,
          gravity: 0.04,
          shake: Math.random() * 0.2
        });
      }
      triggerRenderLoop();
    }

    // --- Custom Guitar Multi touch sweeping tracker ---
    function pluckString(stringId) {
      if (hasUnlocked) return;
      initAudioContext();
      
      const stringObj = GUITAR_PRESET_TUNINGS.find(s => s.id === stringId);
      if (!stringObj) return;

      // Avoid double trigger during single sweep logic pass
      if (!touchedStrings.has(stringId)) {
        touchedStrings.add(stringId);

        // Visual and haptic simulation models
        const strEl = document.querySelector(`[data-string-id="${stringId}"] .string-line`);
        const dotEl = document.querySelector(`[data-string-id="${stringId}"] .bridge-dot`);

        if (strEl) {
          strEl.classList.add('string-vibrate', 'bg-caramel-gold', 'w-[3px]');
          strEl.classList.remove('bg-oatmeal/60');
          strEl.style.boxShadow = `0 0 14px ${stringObj.color}`;
          
          setTimeout(() => {
            strEl.classList.remove('string-vibrate');
          }, 550);
        }

        if (dotEl) {
          dotEl.classList.add('bg-caramel-gold', 'shadow-[0_0_8px_rgba(212,163,115,0.8)]');
          dotEl.classList.remove('bg-caramel-gold/40');
        }

        // Play plucked wave
        playPluckSound(stringObj.frequency);

        // Sequence unlock mechanics check
        if (touchedStrings.size === 6) {
          hasUnlocked = true;
          playUnlockingArpeggio();
          
          // Completed sweep, ready to transition to the greeting cards
          bgAudio.volume = 0;

          setTimeout(() => {
            transitionToSecretBase();
          }, 850);
        }
      }
    }

    let cachedStringRects = [];

    function cacheStringBounds() {
      const items = document.querySelectorAll('[data-string-id]');
      cachedStringRects = Array.from(items).map(el => {
        const rect = el.getBoundingClientRect();
        return {
          id: parseInt(el.getAttribute('data-string-id'), 10),
          left: rect.left,
          right: rect.right
        };
      });
    }

    // Interactive Sweeping coordinates tracker with zero-thrashing performance cache
    function trackSweepMovement(clientX, clientY) {
      // 1. Direct hit-test
      const hoverEl = document.elementFromPoint(clientX, clientY);
      if (hoverEl) {
        const strWrap = hoverEl.closest('[data-string-id]');
        if (strWrap) {
          const sId = parseInt(strWrap.getAttribute('data-string-id'), 10);
          pluckString(sId);
          return;
        }
      }

      // 2. High-speed Fallback using pre-cached boundaries (zero layout thrashing/reflow cost!)
      if (cachedStringRects.length === 0) {
        cacheStringBounds();
      }
      for (let i = 0; i < cachedStringRects.length; i++) {
        const item = cachedStringRects[i];
        if (clientX >= item.left - 12 && clientX <= item.right + 12) {
          pluckString(item.id);
        }
      }
    }

    function hookGuitarGestures() {
      // Desktop Hover sweeping
      const items = document.querySelectorAll('[data-string-id]');
      items.forEach(el => {
        el.addEventListener('mouseenter', () => {
          const sId = parseInt(el.getAttribute('data-string-id'), 10);
          pluckString(sId);
        });
      });

      // Mobile Touch sweeping (Strings cumulative selection across multiple touches instead of resetting)
      const box = document.getElementById('guitar-box');
      box.addEventListener('touchstart', (e) => {
        initAudioContext();
        cacheStringBounds(); // Populate cached coordinates when touch cycle begins (just one fast call)
        const touch = e.touches[0];
        trackSweepMovement(touch.clientX, touch.clientY);
      }, { passive: true });

      box.addEventListener('touchmove', (e) => {
        if (e.touches.length > 0) {
          const touch = e.touches[0];
          trackSweepMovement(touch.clientX, touch.clientY);
        }
      }, { passive: true });
    }

    // --- Screen transition ---
    function transitionToSecretBase() {
      // Elegant fading routines
      screenGuitar.classList.add('opacity-0', 'scale-95');
      setTimeout(() => {
        screenGuitar.classList.add('hidden');
        
        screenSecretBase.classList.remove('hidden');
        // Force reflow
        screenSecretBase.offsetHeight;
        screenSecretBase.classList.remove('opacity-0', 'scale-95');
        
        // Start showing the typewriter lines block
        startTypewriterDisplay();
      }, 800);
    }

    // --- Typewriter Logic ---
    let currentLineIdx = 0;
    
    function startTypewriterDisplay() {
      if (currentLineIdx >= BLESSING_PARAGRAPHS.length) {
        concludeTypewriter();
        return;
      }

      const targetString = BLESSING_PARAGRAPHS[currentLineIdx];
      const initialDelay = currentLineIdx === 0 ? 300 : 250;

      setTimeout(() => {
        let charIdx = 0;
        let buf = '';
        
        // Inline Typist Cursor holder helper
        const activeContainer = document.createElement('div');
        activeContainer.className = 'inline-flex items-center justify-center w-full';
        
        const textLabel = document.createElement('p');
        textLabel.className = 'text-caramel-gold font-serif italic text-base inline';
        
        const cursorDot = document.createElement('span');
        cursorDot.className = 'w-1.5 h-4 bg-caramel-gold ml-1.5 rounded-full animate-ping whitespace-nowrap inline-block';
        
        activeContainer.appendChild(textLabel);
        activeContainer.appendChild(cursorDot);
        typewriterContainer.appendChild(activeContainer);

        const typingTimer = setInterval(() => {
          if (charIdx < targetString.length) {
            buf += targetString.charAt(charIdx);
            textLabel.textContent = buf;
            charIdx++;
            playTypewriterClick();
          } else {
            clearInterval(typingTimer);
            
            // Solidify and clean typed line representation
            activeContainer.remove();
            
            const staticBlock = document.createElement('p');
            staticBlock.className = 'hover:text-caramel-gold transition-colors duration-300 transform translate-y-2 opacity-0 transition-all duration-700';
            staticBlock.textContent = targetString;
            typewriterContainer.appendChild(staticBlock);
            
            // Cascade beautiful subtle slide-up entrance
            setTimeout(() => {
              staticBlock.classList.remove('translate-y-2', 'opacity-0');
            }, 50);

            currentLineIdx++;
            
            // Briefly pause reading and proceed to next paragraph
            setTimeout(() => {
              startTypewriterDisplay();
            }, 450);
          }
        }, 30); // Compact premium typing speed

      }, initialDelay);
    }

    function concludeTypewriter() {
      // Typing fully completed, fade-in bottom candle interaction panel
      candleCard.classList.remove('hidden');
      candleCard.offsetHeight;
      candleCard.classList.remove('opacity-0', 'scale-95');
      
      initSparklesCanvas();
    }

    // --- Soundtrack UI Controller Hooks ---
    function syncSoundtrackWidgets() {
      if (isPlayingMusic) {
        bgAudio.muted = false;
        bgAudio.volume = parseFloat(volumeSlider.value) || 0.35;
        if (!bgAudio.src) {
          bgAudio.src = "https://cdn-www.cw.com.tw/voice/202605/voice-6a171be7eccb65.21769132.mp3";
        }
        bgAudio.play().catch(() => {
          isPlayingMusic = false;
          vinylIcon.classList.remove('animate-spin');
          playPauseBtn.innerHTML = `
            <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polygon points="6 3 20 12 6 21 6 3"/>
            </svg>
          `;
        });
        
        vinylIcon.classList.add('animate-spin');
        vinylIcon.style.animationDuration = '4s';
        
        // Pause icon representation
        playPauseBtn.innerHTML = `
          <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="14" y="4" width="4" height="16" rx="1"/><rect x="6" y="4" width="4" height="16" rx="1"/>
          </svg>
        `;
      } else {
        bgAudio.pause();
        vinylIcon.classList.remove('animate-spin');
        
        // Play icon representation
        playPauseBtn.innerHTML = `
          <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="6 3 20 12 6 21 6 3"/>
          </svg>
        `;
      }
    }

    function hookSoundtrackEvents() {
      // Play/Pause togglers
      playPauseBtn.addEventListener('click', () => {
        isPlayingMusic = !isPlayingMusic;
        syncSoundtrackWidgets();
      });

      // Volume sliders
      volumeSlider.addEventListener('input', (e) => {
        const val = parseFloat(e.target.value);
        bgAudio.volume = val;
        bgAudio.muted = (val === 0);
        updateVolumeBtnIcon(val);
      });

      // Volume click mute buttons
      volumeToggleBtn.addEventListener('click', () => {
        bgAudio.muted = !bgAudio.muted;
        volumeSlider.value = bgAudio.muted ? 0 : bgAudio.volume;
        updateVolumeBtnIcon(bgAudio.muted ? 0 : bgAudio.volume);
      });
    }

    function updateVolumeBtnIcon(val) {
      if (val === 0) {
        volumeToggleBtn.innerHTML = `
          <svg class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M11 5L6 9H2v6h4l5 4V5z"/><line x1="22" y1="9" x2="16" y2="15"/><line x1="16" y1="9" x2="22" y2="15"/>
          </svg>
        `;
      } else {
        volumeToggleBtn.innerHTML = `
          <svg class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M11 5L6 9H2v6h4l5 4V5z"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
          </svg>
        `;
      }
    }

    // --- Candle interaction and wish mechanics form ---
    function hookCandleEvents() {
      // Real-time button active state validation
      function checkInputsFull() {
        const val1 = wishInput1.value.trim();
        const val2 = wishInput2.value.trim();
        const val3 = wishInput3.value.trim();
        if (val1 && val2 && val3) {
          wishSubmitBtn.disabled = false;
        } else {
          wishSubmitBtn.disabled = true;
        }
      }

      wishInput1.addEventListener('input', checkInputsFull);
      wishInput2.addEventListener('input', checkInputsFull);
      wishInput3.addEventListener('input', checkInputsFull);

      // Step 1: Handle form submittal
      wishForm.addEventListener('submit', (e) => {
        e.preventDefault();
        const u1 = wishInput1.value.trim();
        const u2 = wishInput2.value.trim();
        const u3 = wishInput3.value.trim();
        if (!u1 || !u2 || !u3) return;

        selectedWish1 = u1;
        selectedWish2 = u2;
        selectedWish3 = u3;
        candleState = 'lit';

        // Animate state change
        candlePrompt.textContent = "點擊火苗吹熄蠟燭";
        wishForm.classList.add('hidden');
        
        // Show Lit wish badge
        litWishText1.textContent = `1. ${selectedWish1}`;
        litWishText2.textContent = `2. ${selectedWish2}`;
        litWishText3.textContent = `3. ${selectedWish3}`;
        wishLitBadge.classList.remove('hidden');
        
        // Light the physical candle flame (interactive trigger point)
        candleFlame.classList.remove('hidden', 'pointer-events-none');
        candleFlame.classList.add('pointer-events-auto', 'cursor-pointer');
        candleGlow.classList.remove('opacity-0');
        candleGlow.classList.add('opacity-40');

        // Post back-end sheet logging with robust CORS and JSON serialization.
        // Google Sheets Apps Script web apps support standard CORS, and expecting a JSON payload
        // of format: JSON.stringify({ wish: selectedWish1, wish2: selectedWish2, wish3: selectedWish3 })
        const appsScriptUrl = "https://script.google.com/macros/s/AKfycbzWU9F_DDpeO9XNQEJkONSXY1NanfbaHmXS21BtbSB_b77ekSJ7BMDIroU_-rvo7Dfg/exec";

        fetch(appsScriptUrl, {
          method: "POST",
          mode: "cors",
          headers: {
            "Content-Type": "text/plain;charset=utf-8"
          },
          body: JSON.stringify({ 
            wish: selectedWish1, 
            wish1: selectedWish1,
            wish2: selectedWish2,
            wish3: selectedWish3,
            colA: selectedWish1,
            colB: selectedWish2,
            colC: selectedWish3,
            a: selectedWish1,
            b: selectedWish2,
            c: selectedWish3
          })
        })
        .then(response => {
          if (!response.ok) {
            console.warn("Google Sheets Sync returned non-OK status:", response.status);
          }
        })
        .catch(err => {
          console.warn("Google Sheets Sync fetch error:", err);
        });

        // Launch rising particles float from bottom of card
        if (canvas) {
          createRisingSparkles(canvas.width / 2, canvas.height - 40);
        }
      });

      // Step 2: Handle clicking candle flame trigger specifically to extinguish
      candleFlame.addEventListener('click', (e) => {
        e.stopPropagation();
        if (candleState !== 'lit') return;
        candleState = 'blown';

        // Disappear flame and glowing halo
        candleFlame.classList.add('hidden', 'pointer-events-none');
        candleFlame.classList.remove('pointer-events-auto', 'cursor-pointer');
        candleGlow.classList.remove('opacity-40');
        candleGlow.classList.add('opacity-0');

        // Animate prompt sealed state
        candlePrompt.textContent = "祝你願望成真 ☺️";
        wishLitBadge.classList.add('hidden');
        
        // Show sealed final wish card
        finalWishText1.textContent = `1. ${selectedWish1}`;
        finalWishText2.textContent = `2. ${selectedWish2}`;
        finalWishText3.textContent = `3. ${selectedWish3}`;
        wishFinalBadge.classList.remove('hidden');

        // Visual cloud of smoke
        if (canvas) {
          const cx = canvas.width / 2;
          const cy = canvas.height / 2 - 25;
          createWickSmoke(cx, cy);

          // Staggered premium fireworks explosions
          setTimeout(() => { spawnFireworkSplendor(cx, cy - 50, '#D4A373'); }, 350);
          setTimeout(() => { spawnFireworkSplendor(cx - 80, cy - 20, '#F4E3B1'); }, 700);
          setTimeout(() => { spawnFireworkSplendor(cx + 80, cy - 30, '#FFB74D'); }, 1050);
          setTimeout(() => { spawnFireworkSplendor(cx, cy - 100, '#FFFFFF'); }, 1400);
        }
      });
    }

    // --- App life bootstrap ---
    window.addEventListener('DOMContentLoaded', () => {
      hookGuitarGestures();
      hookSoundtrackEvents();
      hookCandleEvents();
      
      // Warm up coordinates lookup
      setTimeout(() => {
        cacheStringBounds();
      }, 150);
      
      window.addEventListener('resize', cacheStringBounds, { passive: true });
    });

  </script>
