<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baby 節拍練習器</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #1e1e24;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .player-container {
            background-color: #2a2a35;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
            text-align: center;
            width: 360px;
        }
        h2 {
            margin-top: 0;
            color: #4dadf7;
            font-size: 1.5rem;
        }
        .btn {
            background-color: #4dadf7;
            border: none;
            color: #2a2a35;
            padding: 10px 15px;
            font-size: 0.9rem;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            margin: 5px;
            transition: background 0.2s;
        }
        .btn:hover {
            background-color: #339af0;
        }
        .btn-secondary {
            background-color: #495057;
            color: #fff;
        }
        .btn-secondary:hover {
            background-color: #343a40;
        }
        .btn-ab {
            background-color: #e64980;
            color: white;
        }
        .btn-ab:hover {
            background-color: #d6336c;
        }
        .control-group {
            margin: 20px 0;
            border-bottom: 1px solid #3b3b4d;
            padding-bottom: 15px;
        }
        .control-group:last-child {
            border-bottom: none;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.9rem;
            color: #adb5bd;
        }
        .display-val {
            font-size: 1.1rem;
            font-weight: bold;
            color: #ffd43b;
        }
        input[type="range"] {
            width: 100%;
            accent-color: #4dadf7;
            margin: 8px 0;
        }
        .time-box {
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
            color: #adb5bd;
            margin-top: -5px;
        }
        .ab-status {
            font-size: 0.85rem;
            color: #da77f2;
            margin-top: 5px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="player-container">
    <h2>🎤 Baby 節拍練習器</h2>
    
    <audio id="practice-audio" src="source/Baby 節拍練習.mp3"></audio>

    <div class="control-group">
        <label>音樂進度：<span id="current-time-display" class="display-val">00:00</span> / <span id="duration-display">00:00</span></label>
        <input type="range" id="progress-slider" min="0" max="100" value="0" step="0.1">
        <div class="time-box">
            <button class="btn btn-secondary" onclick="skip(-5)">-5秒</button>
            <button class="btn" id="play-btn">播放</button>
            <button class="btn btn-secondary" onclick="skip(5)">+5秒</button>
        </div>
    </div>

    <div class="control-group">
        <label>✂️ 片段 A-B 循環</label>
        <div>
            <button class="btn btn-ab" id="set-a-btn">設為起點 A</button>
            <button class="btn btn-ab" id="set-b-btn">設為終點 B</button>
        </div>
        <div style="margin-top: 10px;">
            <input type="checkbox" id="ab-loop-toggle">
            <label style="display:inline; font-weight: bold; color: #da77f2;" for="ab-loop-toggle">啟用片段循環</label>
        </div>
        <div class="ab-status" id="ab-display">未設定範圍 (整首播放)</div>
    </div>

    <div class="control-group">
        <label for="speed-slider">練習速度：<span id="speed-val" class="display-val">1.0</span>x</label>
        <input type="range" id="speed-slider" min="0.5" max="2.0" step="0.05" value="1.0">
    </div>
</div>

<script>
    const audio = document.getElementById('practice-audio');
    const playBtn = document.getElementById('play-btn');
    const progressSlider = document.getElementById('progress-slider');
    const currentTimeDisplay = document.getElementById('current-time-display');
    const durationDisplay = document.getElementById('duration-display');
    const speedSlider = document.getElementById('speed-slider');
    const speedVal = document.getElementById('speed-val');
    
    // AB Loop 變數
    const setABtn = document.getElementById('set-a-btn');
    const setBBtn = document.getElementById('set-b-btn');
    const abLoopToggle = document.getElementById('ab-loop-toggle');
    const abDisplay = document.getElementById('ab-display');
    let timeA = 0;
    let timeB = 0;
    let isBSet = false;
    let isDragging = false; // ✨ 修正：在這裡正確初始化變數

    // 格式化時間 (秒 -> mm:ss)
    function formatTime(seconds) {
        if (isNaN(seconds)) return "00:00";
        const mins = Math.floor(seconds / 60);
        const secs = Math.floor(seconds % 60);
        return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
    }

    // 當音檔載入完成，初始化進度條最大值與總時間
    audio.addEventListener('loadedmetadata', () => {
        progressSlider.max = audio.duration;
        durationDisplay.innerText = formatTime(audio.duration);
        if (!isBSet) timeB = audio.duration; 
    });

    // 播放/暫停
    playBtn.addEventListener('click', () => {
        if (audio.paused) {
            audio.play().then(() => {
                playBtn.innerText = '暫停';
                playBtn.style.backgroundColor = '#ff6b6b';
            }).catch(err => {
                console.error("播放失敗：", err);
            });
        } else {
            audio.pause();
            playBtn.innerText = '播放';
            playBtn.style.backgroundColor = '#4dadf7';
        }
    });

    // 更新進度條與時間顯示
    audio.addEventListener('timeupdate', () => {
        if (!isDragging) {
            progressSlider.value = audio.currentTime;
        }
        currentTimeDisplay.innerText = formatTime(audio.currentTime);

        // 片段循環檢查
        if (abLoopToggle.checked && isBSet) {
            if (audio.currentTime >= timeB || audio.currentTime < timeA) {
                audio.currentTime = timeA; 
            }
        }
    });

    // 處理進度條拖曳跳轉
    progressSlider.addEventListener('mousedown', () => { isDragging = true; });
    progressSlider.addEventListener('touchstart', () => { isDragging = true; });
    
    progressSlider.addEventListener('input', () => {
        currentTimeDisplay.innerText = formatTime(progressSlider.value);
    });

    progressSlider.addEventListener('change', () => {
        audio.currentTime = progressSlider.value;
        isDragging = false;
    });

    // 調整速度
    speedSlider.addEventListener('input', () => {
        audio.playbackRate = speedSlider.value;
        speedVal.innerText = parseFloat(speedSlider.value).toFixed(2);
    });

    // 快進 / 快退
    function skip(seconds) {
        audio.currentTime += seconds;
        progressSlider.value = audio.currentTime;
    }

    // 設定 A 點
    setABtn.addEventListener('click', () => {
        timeA = audio.currentTime;
        setABtn.innerText = `A: ${formatTime(timeA)}`;
        updateABDisplay();
    });

    // 設定 B 點
    setBBtn.addEventListener('click', () => {
        if (audio.currentTime > timeA) {
            timeB = audio.currentTime;
            isBSet = true;
            setBBtn.innerText = `B: ${formatTime(timeB)}`;
            abLoopToggle.checked = true; 
            updateABDisplay();
        } else {
            alert("終點 B 必須大於起點 A 喔！");
        }
    });

    function updateABDisplay() {
        abDisplay.innerText = `循環區間：${formatTime(timeA)} ➔ ${formatTime(timeB)}`;
    }

    // 播完後的按鈕重設
    audio.addEventListener('ended', () => {
        if (!abLoopToggle.checked) {
            playBtn.innerText = '播放';
            playBtn.style.backgroundColor = '#4dadf7';
            progressSlider.value = 0;
        }
    });
</script>

</body>
</html>
